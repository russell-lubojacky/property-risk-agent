name: Claude — Implement Issue

# Triggers when:
#   1. The label "claude-implement" is added  ← primary trigger from GitHub Projects
#   2. Someone comments @claude on an issue   ← manual trigger from issue page
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # ── Guard ──────────────────────────────────────────────────────────────────
  # For comment-triggered runs, verify the commenter has at least Write access
  # before doing any real work. Assignment and label triggers are inherently
  # safe (only collaborators with Write/Triage access can do those actions).
  check-permission:
    name: Verify actor has write access
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check collaborator permission
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # For non-comment events the actor already has write access by definition.
          if [[ "${{ github.event_name }}" != "issue_comment" ]]; then
            echo "allowed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          PERMISSION=$(gh api repos/$REPO/collaborators/$ACTOR/permission \
            --jq '.permission' 2>/dev/null || echo "none")

          # Allow write, maintain, or admin — block read/none (outside contributors)
          if [[ "$PERMISSION" == "write" || "$PERMISSION" == "maintain" || "$PERMISSION" == "admin" ]]; then
            echo "allowed=true" >> $GITHUB_OUTPUT
          else
            echo "allowed=false" >> $GITHUB_OUTPUT
            echo "::warning::@claude triggered by $ACTOR who has '$PERMISSION' access — skipping."
          fi

  # ── Implementation ─────────────────────────────────────────────────────────
  implement:
    name: Implement issue with Claude
    runs-on: ubuntu-latest
    needs: check-permission

    # Trigger conditions (all require the permission guard above to pass):
    #   - claude-implement label added        (Triage access required to label)
    #   - @claude mentioned in issue comment  (Write access verified by guard above)
    if: |
      needs.check-permission.outputs.allowed == 'true' && (
        (
          github.event_name == 'issues' &&
          github.event.action == 'labeled' &&
          github.event.label.name == 'claude-implement'
        ) || (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request == null &&
          contains(github.event.comment.body, '@claude')
        )
      )

    permissions:
      contents: write        # create branches and push commits
      pull-requests: write   # open PRs
      issues: write          # comment on the issue with status updates

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so Claude can understand context

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Resolve the issue number/title consistently across all three trigger types.
      # Both issues and issue_comment events expose github.event.issue.*
      - name: Resolve issue context
        id: issue
        run: |
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT

      - name: Implement issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          prompt: |
            You are an expert SvelteKit/Svelte 5 engineer implementing a GitHub issue for the Property Risk Agent project.

            ## Issue to implement
            Issue #${{ steps.issue.outputs.number }}: ${{ steps.issue.outputs.title }}

            Fetch the full issue body by running:
              gh issue view ${{ steps.issue.outputs.number }} --repo ${{ github.repository }}

            ## Instructions
            1. Read the full issue body using the command above before doing anything else.
            2. Create a new branch named `claude/issue-${{ steps.issue.outputs.number }}` from main.
            3. Read the existing code carefully before making changes. Follow the patterns already established in the codebase (SvelteKit 2, Svelte 5, CSS custom properties design system).
            4. Implement the changes described in the issue. Keep changes focused — do not refactor unrelated code.
            5. Run `npm run build` to verify the code compiles without errors. Fix any build errors before continuing.
            6. Run `npm run check` to catch type errors.
            7. Open a pull request to `main` with:
               - Title: same as the issue title
               - Body: a clear description of what was changed and why, ending with `Closes #${{ steps.issue.outputs.number }}`
               - Add the label `claude-review` to trigger automated peer review

            ## Project context
            - Framework: SvelteKit 2 + Svelte 5, adapter-node (Linode deployment)
            - Design system: CSS custom properties in src/app.css ("The Architectural Lens" theme)
            - Components: src/lib/components/ (NavBar, RiskScoreBadge, RiskFactorRow, IncidentTag)
            - Routes: src/routes/ (+page.svelte, results/, map/, portfolio/)
            - Build command: `npm run build`
            - Check command: `npm run check`

            Post a comment on issue #${{ steps.issue.outputs.number }} when you start work, and another when the PR is opened.
